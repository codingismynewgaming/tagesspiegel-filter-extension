<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tagesspiegel Filter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📰 Tagesspiegel Filter</h1>
    </header>

    <!-- Hide Sections -->
    <section class="hide-sections">
      <div class="section-header">
        <h2>Hide Sections</h2>
        <button id="refreshSections" class="refresh-btn" title="Re-detect sections">
          🔄 Refresh
        </button>
      </div>
      <div class="sections-grid" id="sectionsGrid">
        <!-- Checkboxes will be generated by JS -->
      </div>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
