<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon 96x96</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: transparent;
    }
    .icon {
      width: 96px;
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }
    .icon span {
      font-family: 'Inter', Arial, sans-serif;
      font-size: 72px;
      font-weight: 900;
      color: white;
      text-shadow: 
        -3px -3px 0 black,
        3px -3px 0 black,
        -3px 3px 0 black,
        3px 3px 0 black,
        0 0 6px black;
    }
  </style>
</head>
<body>
  <div class="icon">
    <span>T</span>
  </div>
</body>
</html>
