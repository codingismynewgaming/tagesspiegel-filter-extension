<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tagesspiegel Customizer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📰 Tagesspiegel Customizer</h1>
    </header>

    <!-- Font Settings Section -->
    <section class="font-settings">
      <div class="section-header">
        <h2>Font Settings</h2>
        <label class="toggle-label">
          <input type="checkbox" id="fontEnabledToggle">
          <span class="toggle-switch"></span>
          <span class="toggle-text">Enabled</span>
        </label>
      </div>
      <div class="font-grid">
        <div class="font-control">
          <label for="bodyFontSize">Body Text</label>
          <select id="bodyFontSize">
            <option value="4">4px</option>
            <option value="5">5px</option>
            <option value="6">6px</option>
            <option value="7">7px</option>
            <option value="8">8px</option>
            <option value="9">9px</option>
            <option value="10" selected>10px</option>
            <option value="11">11px</option>
            <option value="12">12px</option>
            <option value="13">13px</option>
            <option value="14">14px</option>
            <option value="15">15px</option>
            <option value="16">16px</option>
          </select>
          <div class="preview">Preview: Aa</div>
        </div>
        <div class="font-control">
          <label for="headlinesFontSize">Headlines</label>
          <select id="headlinesFontSize">
            <option value="6">6px</option>
            <option value="7">7px</option>
            <option value="8">8px</option>
            <option value="9">9px</option>
            <option value="10">10px</option>
            <option value="11">11px</option>
            <option value="12" selected>12px</option>
            <option value="13">13px</option>
            <option value="14">14px</option>
            <option value="15">15px</option>
            <option value="16">16px</option>
            <option value="17">17px</option>
            <option value="18">18px</option>
          </select>
          <div class="preview">Preview: Aa</div>
        </div>
      </div>
    </section>

    <!-- Hide Sections -->
    <section class="hide-sections">
      <div class="section-header">
        <h2>Hide Sections</h2>
        <button id="refreshSections" class="refresh-btn" title="Re-detect sections">
          🔄 Refresh
        </button>
      </div>
      <div class="sections-grid" id="sectionsGrid">
        <!-- Checkboxes will be generated by JS -->
      </div>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
